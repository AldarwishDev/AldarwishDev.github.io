<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سياسة الخصوصية | Ahmad Aldarwish</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg-color: #ffffff; --text-main: #111827; --text-sec: #6b7280; --accent: #10b981; --border-color: #e5e7eb; --card-bg: #f9fafb; --code-font: 'Fira Code', monospace; }
        [data-theme="dark"] { --bg-color: #0d1117; --text-main: #e6edf3; --text-sec: #8b949e; --accent: #34d399; --border-color: #30363d; --card-bg: #161b22; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; transition: 0.3s; display: flex; flex-direction: column; min-height: 100vh; }
        html[dir="ltr"] body { font-family: 'Roboto', sans-serif; }

        header { position: sticky; top: 0; background-color: rgba(var(--bg-color), 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 1000; padding: 15px 0; }
        .nav-container { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .back-link { font-size: 1.1rem; font-weight: 700; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .back-link:hover { color: var(--accent); }
        html[dir="ltr"] .back-link .material-symbols-outlined { transform: rotate(180deg); }

        .header-controls { display: flex; align-items: center; gap: 10px; }
        .icon-btn, .lang-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 8px; transition: 0.2s; }
        .icon-btn:hover, .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
        .lang-btn { font-family: var(--code-font); font-weight: bold; width: auto; padding: 0 12px; }

        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; flex: 1; width: 100%; text-align: center;}
        .section-tag { font-family: var(--code-font); font-size: 0.9rem; font-weight: 700; color: var(--text-sec); letter-spacing: 2px; margin-bottom: 20px; display: block; }
        h1 { font-size: 2.5rem; color: var(--text-main); font-weight: 900; margin-bottom: 30px; }
        
        .content-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        html[dir="ltr"] .content-card { text-align: left; }
        
        .content-card h2 { color: var(--accent); font-size: 1.4rem; margin-top: 30px; margin-bottom: 15px; font-family: var(--code-font); }
        .content-card p { font-size: 1.1rem; color: var(--text-sec); line-height: 1.8; margin-bottom: 15px; }
        .content-card ul { margin-inline-start: 25px; margin-bottom: 15px; }
        .content-card li { font-size: 1.1rem; color: var(--text-sec); margin-bottom: 8px; line-height: 1.8;}
        .content-card .last-updated { font-weight: bold; color: var(--text-main); margin-bottom: 20px; }

        footer { padding: 40px 20px; border-top: 1px solid var(--border-color); margin-top: 40px; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 15px; }
        .social-links a { color: var(--text-sec); font-size: 1.4rem; transition: 0.2s; }
        .social-links a:hover { color: var(--accent); transform: translateY(-3px); }
        .copyright { color: var(--text-sec); font-size: 0.95rem; font-family: var(--code-font); }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/" class="back-link"><span class="material-symbols-outlined">arrow_forward</span><span data-i18n="back">العودة للرئيسية</span></a>
            <div class="header-controls">
                <button class="icon-btn" onclick="toggleTheme()"><span class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
                <button class="lang-btn" onclick="toggleLanguage()" id="lang-btn-text">EN</button>
            </div>
        </div>
    </header>

    <div class="container">
        <span class="section-tag">/* PRIVACY POLICY */</span>
        <h1 data-i18n="title">سياسة الخصوصية</h1>
        
        <div class="content-card">
            <p class="last-updated" data-i18n="last_updated"></p>
            <p data-i18n="intro"></p>
            
            <h2 data-i18n="h1"></h2>
            <div data-i18n="p1"></div>
            
            <h2 data-i18n="h2"></h2>
            <div data-i18n="p2"></div>
            
            <h2 data-i18n="h3"></h2>
            <div data-i18n="p3"></div>

            <h2 data-i18n="h4"></h2>
            <div data-i18n="p4"></div>

            <h2 data-i18n="h5"></h2>
            <div data-i18n="p5"></div>

            <h2 data-i18n="h6"></h2>
            <div data-i18n="p6"></div>

            <h2 data-i18n="h7"></h2>
            <div data-i18n="p7"></div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="YOUR_X_LINK" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="YOUR_GITHUB_LINK" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
        <p class="copyright">© 2026 Ahmad.dev</p>
    </footer>

    <script>
        const translations = {
            ar: { 
                back: "العودة للرئيسية", 
                title: "سياسة الخصوصية", 
                last_updated: "آخر تحديث: يوليو 2026",
                intro: "يلتزم المطور أحمد الدرويش بحماية خصوصيتك. توضح سياسة الخصوصية هذه بوضوح كيفية تعاملنا مع المعلومات عند استخدامك لتطبيق وصل على جميع المنصات المدعومة (هواتف Android وساعات Wear OS).", 
                h1: "// 1. جمع البيانات واستخدامها", 
                p1: "<p>تم بناء تطبيق وصل على مبدأ 'الخصوصية أولاً'. نحن لا نقوم بجمع، تخزين، بيع، أو مشاركة أي بيانات شخصية مع أطراف ثالثة. البيانات المستخدمة تبقى على جهازك:</p><ul><li><strong>بيانات الموقع:</strong> نحتاج إلى الوصول للموقع لحساب أوقات الصلاة بدقة. تتم معالجة ذلك محلياً ولا يتم إرساله إلى أي خادم أبداً.</li><li><strong>الشبكة المحلية:</strong> نستخدم الوصول للشبكة المحلية لاكتشاف الأجهزة الذكية لبث الأذان بشكل آمن داخل شبكتك المنزلية.</li><li><strong>مزامنة Wear OS:</strong> تتم مزامنة الإعدادات وبيانات الصلاة بين هاتفك وساعتك باستخدام طبقة بيانات Google Wearable. هذا الاتصال مشفر ويحدث مباشرة بين أجهزتك.</li></ul>", 
                h2: "// 2. الصلاحيات الحساسة", 
                p2: "<p>لتقديم تجربة سلسة وموثوقة، يتطلب التطبيق صلاحيات محددة تُستخدم حصرياً لوظائفه الأساسية:</p><ul><li><strong>المنبهات الدقيقة والإشعارات:</strong> ضرورية لإطلاق إشعارات الأذان في الوقت المحدد بدقة وتنبيهك.</li><li><strong>إدارة التطبيقات:</strong> لتمكين وضع التركيز وحظر التطبيقات المشتتة أثناء الصلاة، يُطلب وصول خاص. هذا الخيار اختياري تماماً.</li><li><strong>بطارية غير مقيدة:</strong> لمنع نظام Android من إغلاق التطبيق في الخلفية، مما يضمن عدم تفويتك لأي صلاة.</li><li><strong>الأجهزة القريبة (الشبكة المحلية):</strong> تُستخدم حصرياً لاكتشاف أجهزة التلفاز/مكبرات الصوت الذكية لميزة البث.</li></ul>", 
                h3: "// 3. المدفوعات والدعم", 
                p3: "<p>عندما تقوم بدعم المشروع عبر المشتريات داخل التطبيق:</p><ul><li>نستخدم واجهة Google Play للفوترة. ليس لدينا وصول إلى معلومات بطاقتك الائتمانية أو معلومات الدفع ولا نقوم بتخزينها.</li><li>قد تقوم Google Play بجمع البيانات وفقاً لسياسات الخصوصية الخاصة بها لمعالجة المعاملة.</li></ul>",
                h4: "// 4. التخزين والنسخ الاحتياطي",
                p4: "<p>يتم حفظ جميع إعداداتك وسجلات متتبع العبادات محلياً في مساحة تخزين هاتفك. نوفر لك أدوات لتصدير واستيراد بياناتك يدوياً وبشكل آمن.</p>",
                h5: "// 5. خدمات الأطراف الثالثة",
                p5: "<p>لا يحتوي تطبيق وصل على أي إعلانات على الإطلاق ولا يستخدم أدوات تتبع خارجية لجمع التحليلات التسويقية. نحن نستخدم:</p><ul><li><strong>خدمة Firebase للمراسلة السحابية:</strong> لتقديم التحديثات أو الإعلانات الهامة من حين لآخر (اختياري).</li><li><strong>خدمات Google Play:</strong> للمدفوعات ومزامنة الأجهزة القابلة للارتداء.</li></ul>",
                h6: "// 6. التغييرات على سياسة الخصوصية",
                p6: "<p>قد نقوم بتحديث هذه السياسة بشكل دوري. استمرارك في استخدام التطبيق يشكل قبولك لأي تغييرات تتم عليها.</p>",
                h7: "// 7. اتصل بنا",
                p7: "<p>إذا كان لديك أي أسئلة بخصوص سياسة الخصوصية الخاصة بنا، يُرجى التواصل معنا عبر البريد الإلكتروني: contact@ahmadaldarwish.com</p>"
            },
            en: { 
                back: "Back to Home", 
                title: "Privacy Policy", 
                last_updated: "Last Updated: July 2026",
                intro: "Developer Ahmad Aldarwish is committed to protecting your privacy. This Privacy Policy clearly explains how we handle information when you use the Wasl app across all supported platforms (Android Phone and Wear OS).", 
                h1: "// 1. Data Collection and Usage", 
                p1: "<p>The Wasl app is built on a Privacy-First principle. We do not collect, store, sell, or share any personal data with third parties. Data used remains on your device:</p><ul><li><strong>Location Data:</strong> We require location access to calculate prayer times accurately. This is processed locally and never sent to any server.</li><li><strong>Local Network:</strong> We use local network access to discover smart devices for casting the Adhan securely within your home network.</li><li><strong>Wear OS Sync:</strong> Settings and prayer data are synced between your phone and watch using the Google Wearable Data Layer. This communication is encrypted and happens directly between your devices.</li></ul>", 
                h2: "// 2. Sensitive Permissions", 
                p2: "<p>To provide a seamless and reliable experience, the app requires specific permissions used solely for its core functionalities:</p><ul><li><strong>Exact Alarms & Notifications:</strong> Essential to trigger Adhan notifications accurately on time and alert you.</li><li><strong>App Management:</strong> To enable Focus Mode and block distracting apps during prayers, special access is required. This is entirely optional.</li><li><strong>Unrestricted Battery:</strong> To prevent the Android system from killing the app in the background, ensuring you never miss a prayer.</li><li><strong>Nearby Devices (Local Network):</strong> Used exclusively to discover smart TVs/speakers for the casting feature.</li></ul>", 
                h3: "// 3. Payments and Support", 
                p3: "<p>When you support the project via In-App Purchases:</p><ul><li>We use the Google Play Billing API. We do not have access to, nor do we store, your credit card or payment information.</li><li>Google Play may collect data according to their own privacy policies to process the transaction.</li></ul>",
                h4: "// 4. Storage and Backup",
                p4: "<p>All your settings and Ibadah Tracker records are saved locally on your phone's storage. We provide tools for manual and secure data export/import.</p>",
                h5: "// 5. Third-Party Services",
                p5: "<p>Wasl contains absolutely no advertisements and does not use external tracking tools to collect marketing analytics. We use:</p><ul><li><strong>Firebase Cloud Messaging:</strong> To deliver occasional important updates or announcements (optional).</li><li><strong>Google Play Services:</strong> For billing and wearable synchronization.</li></ul>",
                h6: "// 6. Changes to Privacy Policy",
                p6: "<p>We may update this policy periodically. Continued use of the application constitutes acceptance of any changes.</p>",
                h7: "// 7. Contact Us",
                p7: "<p>If you have any questions regarding our Privacy Policy, please contact us via email: contact@ahmadaldarwish.com</p>"
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', lang);
            document.getElementById('lang-btn-text').textContent = lang === 'ar' ? 'EN' : 'AR';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
            });
        }
        function toggleLanguage() { setLanguage(document.documentElement.getAttribute('lang') === 'ar' ? 'en' : 'ar'); }
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
            localStorage.setItem('preferredTheme', newTheme);
        }
        window.onload = () => {
            let savedTheme = localStorage.getItem('preferredTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
            setLanguage(localStorage.getItem('preferredLang') || 'ar');
        };
    </script>
</body>
</html>
