<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شروط الاستخدام | Ahmad Aldarwish</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg-color: #ffffff; --text-main: #111827; --text-sec: #6b7280; --accent: #10b981; --border-color: #e5e7eb; --card-bg: #f9fafb; --code-font: 'Fira Code', monospace; }
        [data-theme="dark"] { --bg-color: #0d1117; --text-main: #e6edf3; --text-sec: #8b949e; --accent: #34d399; --border-color: #30363d; --card-bg: #161b22; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; transition: 0.3s; display: flex; flex-direction: column; min-height: 100vh; }
        html[dir="ltr"] body { font-family: 'Roboto', sans-serif; }

        /* Header */
        header { position: sticky; top: 0; background-color: rgba(var(--bg-color), 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 1000; padding: 15px 0; }
        .nav-container { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .back-link { font-size: 1.1rem; font-weight: 700; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .back-link:hover { color: var(--accent); }
        html[dir="ltr"] .back-link .material-symbols-outlined { transform: rotate(180deg); }

        .header-controls { display: flex; align-items: center; gap: 10px; }
        .icon-btn, .lang-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 8px; transition: 0.2s; }
        .icon-btn:hover, .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
        .lang-btn { font-family: var(--code-font); font-weight: bold; width: auto; padding: 0 12px; }

        /* Main Content */
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; flex: 1; width: 100%; text-align: center;}
        .section-tag { font-family: var(--code-font); font-size: 0.9rem; font-weight: 700; color: var(--text-sec); letter-spacing: 2px; margin-bottom: 20px; display: block; }
        h1 { font-size: 2.5rem; color: var(--text-main); font-weight: 900; margin-bottom: 30px; }
        
        .content-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        html[dir="ltr"] .content-card { text-align: left; }
        
        .content-card h2 { color: var(--accent); font-size: 1.4rem; margin-top: 30px; margin-bottom: 15px; font-family: var(--code-font); }
        .content-card p { font-size: 1.1rem; color: var(--text-sec); line-height: 1.8; margin-bottom: 15px; }
        .content-card ul { margin-inline-start: 25px; margin-bottom: 15px; }
        .content-card li { font-size: 1.1rem; color: var(--text-sec); margin-bottom: 8px; line-height: 1.8;}
        .content-card .last-updated { font-weight: bold; color: var(--text-main); margin-bottom: 20px; }

        /* Footer */
        footer { padding: 40px 20px; border-top: 1px solid var(--border-color); margin-top: 40px; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 15px; }
        .social-links a { color: var(--text-sec); font-size: 1.4rem; transition: 0.2s; }
        .social-links a:hover { color: var(--accent); transform: translateY(-3px); }
        .copyright { color: var(--text-sec); font-size: 0.95rem; font-family: var(--code-font); }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/" class="back-link">
                <span class="material-symbols-outlined">arrow_forward</span>
                <span data-i18n="back">العودة للرئيسية</span>
            </a>
            <div class="header-controls">
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">
                    <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
                </button>
                <button class="lang-btn" onclick="toggleLanguage()" id="lang-btn-text">EN</button>
            </div>
        </div>
    </header>

    <div class="container">
        <span class="section-tag">/* TERMS OF USE */</span>
        <h1 data-i18n="title">شروط الاستخدام</h1>
        
        <div class="content-card">
            <p class="last-updated" data-i18n="last_updated"></p>
            <p data-i18n="intro"></p>
            
            <h2 data-i18n="h1"></h2>
            <div data-i18n="p1"></div>
            
            <h2 data-i18n="h2"></h2>
            <div data-i18n="p2"></div>
            
            <h2 data-i18n="h3"></h2>
            <div data-i18n="p3"></div>

            <h2 data-i18n="h4"></h2>
            <div data-i18n="p4"></div>

            <h2 data-i18n="h5"></h2>
            <div data-i18n="p5"></div>

            <h2 data-i18n="h6"></h2>
            <div data-i18n="p6"></div>

            <h2 data-i18n="h7"></h2>
            <div data-i18n="p7"></div>

            <h2 data-i18n="h8"></h2>
            <div data-i18n="p8"></div>

            <h2 data-i18n="h9"></h2>
            <div data-i18n="p9"></div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="YOUR_X_LINK" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="YOUR_GITHUB_LINK" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
        <p class="copyright">© 2026 Ahmad.dev</p>
    </footer>

    <script>
        const translations = {
            ar: { 
                back: "العودة للرئيسية", 
                title: "شروط الاستخدام", 
                last_updated: "آخر تحديث: يوليو 2026",
                intro: "بتحميلك أو استخدامك لتطبيق وصل (Wasl)، تنطبق عليك هذه الشروط تلقائياً. يُرجى قراءتها بعناية قبل استخدام التطبيق.", 
                h1: "// 1. الترخيص والاستخدام", 
                p1: "<p>يمنحك المطور أحمد الدرويش ترخيصاً شخصياً وغير حصري وغير قابل للتحويل لاستخدام تطبيق وصل على أجهزتك الشخصية المتوافقة، بما في ذلك هواتف Android وساعات Wear OS.</p><ul><li>لا يُسمح لك بنسخ التطبيق أو تعديله أو استخدام علاماتنا التجارية بأي شكل من الأشكال.</li><li>لا يُسمح لك بمحاولة استخراج الكود المصدري للتطبيق أو ترجمته الهندسيّة.</li></ul>", 
                h2: "// 2. دقة المواقيت (إخلاء مسؤولية)", 
                p2: "<p>يقوم التطبيق بحساب أوقات الصلاة بناءً على موقعك باستخدام المعايير العالمية. ومع ذلك:</p><ul><li>قد تحدث اختلافات طفيفة بسبب عوامل جغرافية أو فقهية.</li><li>أنت تقر وتوافق على أن التحقق من أوقات الصلاة الفعلية هو مسؤوليتك. المطور غير مسؤول عن أي حسابات غير دقيقة.</li></ul>", 
                h3: "// 3. تطبيق ساعات Wear OS", 
                p3: "<p>يتضمن تطبيق وصل إصداراً مخصصاً لساعات Wear OS. يتزامن هذا التطبيق مع هاتفك لتوفير أوقات الصلاة والواجهات المصغرة (Tiles) والإضافات (Complications). باستخدامك لتطبيق Wear OS، فإنك توافق على مزامنة البيانات (مثل أوقات الصلاة والإعدادات) بين هاتفك وساعتك عبر طبقة بيانات Google Wearable.</p>",
                h4: "// 4. الدعم والمشتريات داخل التطبيق",
                p4: "<p>يوفر تطبيق وصل ميزة 'دعم المشروع' الاختيارية عبر المشتريات داخل تطبيق Google Play.</p><ul><li>هذه المساهمات طوعية وتهدف إلى دعم التطوير المستمر للتطبيق وصيانته.</li><li>تتم معالجة جميع المعاملات بشكل آمن بواسطة Google Play.</li><li>لا تفتح المساهمات محتوى 'مميز' إضافي، حيث يظل تطبيق وصل جهداً غير ربحي للمجتمع.</li><li>تخضع عمليات استرداد الأموال لهذه المساهمات لسياسات الاسترداد الخاصة بـ Google Play.</li></ul>",
                h5: "// 5. الصلاحيات ووضع التركيز",
                p5: "<p>يعتمد التطبيق على بعض الصلاحيات مثل المنبهات الدقيقة. فيما يخص وضع التركيز:</p><ul><li>يتطلب هذا الوضع صلاحيات إضافية لحظر التطبيقات المشتتة أثناء أوقات الصلاة.</li><li>استخدام هذه الميزة اختياري تماماً، وأنت مسؤول عن التطبيقات التي تختار حظرها.</li></ul>",
                h6: "// 6. البث الذكي والشبكة",
                p6: "<p>لبث الأذان، يبحث التطبيق في شبكتك المحلية عن الأجهزة المتوافقة. نحن لا نجمع أو نرسل معلومات أجهزة منزلك لأي جهة خارجية. تتم العملية بالكامل بشكل محلي.</p>",
                h7: "// 7. الملكية الفكرية",
                p7: "<p>جميع حقوق الملكية الفكرية تعود حصرياً للمطور. يتم استخدام الوسائط المدمجة وفقاً لمبدأ الاستخدام العادل للأغراض الدينية غير الربحية.</p>",
                h8: "// 8. التغييرات على الشروط",
                p8: "<p>نحتفظ بالحق في تحديث هذه الشروط في أي وقت. استمرارك في استخدام التطبيق يشكل قبولك للشروط الجديدة.</p>",
                h9: "// 9. اتصل بنا",
                p9: "<p>إذا كان لديك أي أسئلة بخصوص شروط الاستخدام هذه، يُرجى التواصل معنا عبر البريد الإلكتروني: contact@ahmadaldarwish.com</p>"
            },
            en: { 
                back: "Back to Home", 
                title: "Terms of Use", 
                last_updated: "Last Updated: July 2026",
                intro: "By downloading or using the Wasl app, these terms will automatically apply to you. Please read them carefully before using the app.", 
                h1: "// 1. License and Usage", 
                p1: "<p>Developer Ahmad Aldarwish grants you a personal, non-exclusive, non-transferable license to use the Wasl app on your personal compatible devices, including compatible Android smartphones and Wear OS watches.</p><ul><li>You are not allowed to copy, modify the app, or use our trademarks in any way.</li><li>You are not allowed to attempt to extract the source code of the app or translate it.</li></ul>", 
                h2: "// 2. Timing Accuracy (Disclaimer)", 
                p2: "<p>The app calculates prayer times based on your location using global standards. However:</p><ul><li>Slight variations may occur due to geographical or jurisprudential factors.</li><li>You acknowledge and agree that verifying actual prayer times is your responsibility. The developer is not liable for any miscalculations.</li></ul>", 
                h3: "// 3. Wear OS Companion", 
                p3: "<p>Wasl includes a Wear OS companion app. This app syncs with your phone to provide prayer times, tiles, and complications. By using the Wear OS app, you agree that data (such as prayer times and settings) will be synced between your phone and watch via the Google Wearable Data Layer.</p>",
                h4: "// 4. Support and In-App Purchases",
                p4: "<p>Wasl offers an optional 'Support the Project' feature via Google Play In-App Purchases.</p><ul><li>These contributions are voluntary and are intended to support the ongoing development and maintenance of the app.</li><li>All transactions are processed securely by Google Play.</li><li>Contributions do not unlock 'premium' content, as Wasl remains a non-profit effort for the community.</li><li>Refunds for these digital contributions are subject to Google Play’s refund policies.</li></ul>",
                h5: "// 5. Permissions and Focus Mode",
                p5: "<p>The app relies on permissions like exact alarms. Regarding Focus Mode:</p><ul><li>This mode requires additional permissions to block distracting apps during prayer.</li><li>Using this feature is entirely optional, and you are responsible for the apps you choose to block.</li></ul>",
                h6: "// 6. Smart Cast and Network",
                p6: "<p>To cast the Adhan, the app searches your local network for compatible devices. We do not collect or transmit your home device information. The process is completely local.</p>",
                h7: "// 7. Intellectual Property",
                p7: "<p>All intellectual property rights belong exclusively to the developer. Embedded media assets are used under fair use for non-profit religious purposes.</p>",
                h8: "// 8. Changes to Terms",
                p8: "<p>We reserve the right to update these terms at any time. Your continued use of the app constitutes your acceptance of the new terms.</p>",
                h9: "// 9. Contact Us",
                p9: "<p>If you have any questions regarding these Terms of Use, please contact us via email: contact@ahmadaldarwish.com</p>"
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', lang);
            document.getElementById('lang-btn-text').textContent = lang === 'ar' ? 'EN' : 'AR';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
            });
        }

        function toggleLanguage() { 
            const currentLang = document.documentElement.getAttribute('lang') || 'ar';
            setLanguage(currentLang === 'ar' ? 'en' : 'ar'); 
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
            localStorage.setItem('preferredTheme', newTheme);
        }

        window.onload = () => {
            let savedTheme = localStorage.getItem('preferredTheme');
            if (!savedTheme) {
                savedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
            
            const savedLang = localStorage.getItem('preferredLang') || 'ar';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
