<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ادعم تطوير مشاريعنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4f8f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .donate-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #006d40; }
        p { color: #555; font-size: 1.2rem; margin-bottom: 30px; }
        .donate-btn {
            display: inline-block;
            background: #ffba00;
            color: #1a1c1e;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .donate-btn:hover { background: #e5a700; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="donate-card">
        <h1>شكراً لدعمك! ❤️</h1>
        <p>دعمك يساعدني على الاستمرار في تطوير تطبيقات إسلامية ذكية ومفانية خالية من الإعلانات المزعجة.</p>
        <!-- سيتم ربط هذا الزر ببوابة الدفع لاحقاً -->
        <a href="#" class="donate-btn">تبرع الآن</a>
    </div>
</body>
</html>
