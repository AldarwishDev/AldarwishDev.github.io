<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum | Wasl App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <style>
        :root {
            --md-sys-color-primary: #006d40;
            --md-sys-color-background: #f8fafd;
            --md-sys-color-surface: rgba(255, 255, 255, 0.85);
            --md-sys-color-on-surface: #1a1c1e;
            --text-muted: #555555;
            --card-border: rgba(0, 109, 64, 0.1);
            --glass-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.04);
            --glass-blur: blur(20px);
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #2bc07b;
            --md-sys-color-background: #0b0d10;
            --md-sys-color-surface: rgba(20, 22, 28, 0.85);
            --md-sys-color-on-surface: #e2e2e9;
            --text-muted: #a0a0b5;
            --card-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-on-surface); line-height: 1.8; transition: 0.4s; display: flex; flex-direction: column; min-height: 100vh; }
        html[dir="rtl"] body { font-family: 'Tajawal', sans-serif; }

        header { background: var(--md-sys-color-surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 1000; padding: 15px 0; transition: 0.4s; }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        
        .logo { font-size: 20px; font-weight: 900; color: var(--md-sys-color-primary); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .logo .material-symbols-outlined { transition: transform 0.3s ease; }
        html[dir="rtl"] .logo .material-symbols-outlined { transform: scaleX(-1); }
        
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .theme-btn { background: transparent; border: none; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: 0.3s; }
        .theme-btn:hover { background: rgba(43, 192, 123, 0.15); }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: transparent; border: 2px solid var(--md-sys-color-primary); color: var(--md-sys-color-primary); padding: 5px 14px; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .dropbtn:hover { background: var(--md-sys-color-primary); color: var(--md-sys-color-background); }
        .dropdown-content { display: none; position: absolute; top: 100%; right: 0; margin-top: 10px; background: var(--md-sys-color-surface); min-width: 120px; box-shadow: var(--glass-shadow); border-radius: 16px; overflow: hidden; z-index: 1; border: 1px solid var(--card-border); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); }
        .dropdown:hover .dropdown-content { display: block; }
        html[dir="ltr"] .dropdown-content { right: 0; left: auto; }
        .dropdown-content button { color: var(--md-sys-color-on-surface); padding: 12px 15px; text-decoration: none; display: block; width: 100%; text-align: left; background: none; border: none; font-family: inherit; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: bold; }
        html[dir="rtl"] .dropdown-content button { text-align: right; }
        .dropdown-content button:hover { background: var(--md-sys-color-primary); color: #fff; }

        .legal-container { max-width: 800px; margin: 40px auto; padding: 40px; background: var(--md-sys-color-surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--card-border); border-radius: 24px; box-shadow: var(--glass-shadow); flex: 1; transition: 0.4s;}
        
        .page-title { font-size: 2.2rem; color: var(--md-sys-color-primary); font-weight: 900; margin-bottom: 40px; border-bottom: 1px solid var(--card-border); padding-bottom: 20px;}
        
        .legal-content h2 { font-size: 1.4rem; color: var(--md-sys-color-on-surface); margin: 35px 0 15px; font-weight: 700; }
        .legal-content p { color: var(--text-muted); margin-bottom: 10px; font-size: 1.05rem; }
        .legal-content .contact-info { background: rgba(0, 109, 64, 0.05); padding: 20px; border-radius: 16px; margin: 20px 0; border: 1px solid var(--card-border); }

        @media (max-width: 768px) {
            .legal-container { margin: 20px; padding: 25px; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/wasl" class="logo">
                <span class="material-symbols-outlined">arrow_back</span>
                <span data-i18n="back_to_wasl">Back to Wasl App</span>
            </a>
            <div class="header-controls">
                <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()">
                    <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
                </button>
                <div class="dropdown">
                    <button class="dropbtn">
                        <span id="current-lang-text">EN</span>
                        <span class="material-symbols-outlined" style="font-size: 18px;">language</span>
                    </button>
                    <div class="dropdown-content">
                        <button onclick="setLanguage('en')">English</button>
                        <button onclick="setLanguage('ar')">العربية</button>
                        <button onclick="setLanguage('de')">Deutsch</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="legal-container">
        <h1 class="page-title" data-i18n="page_title">Impressum</h1>

        <div class="legal-content">
            <h2 data-i18n="h_tmg"></h2>
            <p><strong>Ahmad Aldarwish</strong></p>
            <p data-i18n="p_address_1"></p>
            <p data-i18n="p_address_2"></p>

            <div class="contact-info">
                <h2 style="margin-top: 0;" data-i18n="h_contact"></h2>
                <p><span data-i18n="p_phone"></span> <strong dir="ltr">[Your Phone Number]</strong></p>
                <p><span data-i18n="p_email"></span> <strong>contact@ahmadaldarwish.com</strong></p>
            </div>

            <h2 data-i18n="h_disclaimer"></h2>
            <p data-i18n="p_disclaimer"></p>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                back_to_wasl: "Back to Wasl App", 
                page_title: "Impressum (Legal Notice)", 
                h_tmg: "Information pursuant to § 5 TMG", 
                p_address_1: "[Your Street and House Number]", 
                p_address_2: "[Your Postal Code and City], Germany", 
                h_contact: "Contact Information", 
                p_phone: "Phone:", 
                p_email: "Email:", 
                h_disclaimer: "Disclaimer", 
                p_disclaimer: "The contents of our pages have been created with the utmost care. However, we cannot guarantee the contents' accuracy, completeness, or topicality. According to statutory provisions, we are furthermore responsible for our own content on these web pages. Please note that we are not obliged to monitor the transmitted or saved information of third parties, or investigate circumstances pointing to illegal activity."
            },
            ar: {
                back_to_wasl: "العودة لتطبيق وصل", 
                page_title: "الإشعار القانوني (Impressum)", 
                h_tmg: "معلومات وفقاً للمادة 5 من قانون وسائل الإعلام الإلكترونية الألمانية (TMG)", 
                p_address_1: "[اسم الشارع ورقم المنزل]", 
                p_address_2: "[الرمز البريدي واسم المدينة]، ألمانيا", 
                h_contact: "معلومات التواصل", 
                p_phone: "رقم الهاتف:", 
                p_email: "البريد الإلكتروني:contact@ahmadaldarwish.com", 
                h_disclaimer: "إخلاء المسؤولية", 
                p_disclaimer: "تم إعداد محتوى صفحاتنا بعناية فائقة. ومع ذلك، لا يمكننا ضمان دقة واكتمال وحداثة المحتوى. وفقاً للأحكام القانونية، نحن مسؤولون عن المحتوى الخاص بنا على صفحات الويب هذه. يُرجى ملاحظة أننا غير ملزمين بمراقبة المعلومات المنقولة أو المحفوظة لأطراف ثالثة، أو التحقيق في الظروف التي تشير إلى نشاط غير قانوني."
            },
            de: {
                back_to_wasl: "Zurück zur Wasl App", 
                page_title: "Impressum", 
                h_tmg: "Angaben gemäß § 5 TMG", 
                p_address_1: "Lochhausener Straße, 15", 
                p_address_2: "81247, München, Deutschland", 
                h_contact: "Kontakt", 
                p_phone: "Telefon:+4917666601119", 
                p_email: "E-Mail:contact@ahmadaldarwish.com", 
                h_disclaimer: "Haftungsausschluss", 
                p_disclaimer: "Die Inhalte unserer Seiten wurden mit größter Sorgfalt erstellt. Für die Richtigkeit, Vollständigkeit und Aktualität der Inhalte können wir jedoch keine Gewähr übernehmen. Als Diensteanbieter sind wir gemäß § 7 Abs.1 TMG für eigene Inhalte auf diesen Seiten nach den allgemeinen Gesetzen verantwortlich. Nach §§ 8 bis 10 TMG sind wir als Diensteanbieter jedoch nicht verpflichtet, übermittelte oder gespeicherte fremde Informationen zu überwachen oder nach Umständen zu forschen, die auf eine rechtswidrige Tätigkeit hinweisen."
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', lang);
            document.getElementById('current-lang-text').textContent = lang.toUpperCase();
            
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) { element.innerHTML = translations[lang][key]; }
            });
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
            localStorage.setItem('preferredTheme', newTheme);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('preferredTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';

            const savedLang = localStorage.getItem('preferredLang') || 'en';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
