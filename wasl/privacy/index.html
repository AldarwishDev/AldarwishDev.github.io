                intro_text: "Der Entwickler Ahmad Aldarwish verpflichtet sich, Ihre Privatsphäre zu schützen. Diese Datenschutzerklärung erklärt klar, wie wir mit Informationen umgehen, wenn Sie die Wasl-App auf allen unterstützten Plattformen (Android-Telefon und Wear OS) nutzen.",
                
                h_data: "1. Datenerhebung und Privacy-First-Prinzip", p_data_1: "Die Wasl-App basiert auf einem strengen <strong>Privacy-First</strong>-Prinzip. Wir sammeln, verkaufen, vermieten oder tauschen keine persönlichen Daten oder Nutzungsanalysen mit Dritten oder Werbenetzwerken. Die von der App verwendeten Daten verbleiben strikt auf Ihrem Gerät:",
                li_data_1: "<strong>Standortdaten:</strong> Der Standortzugriff (ACCESS_FINE_LOCATION / ACCESS_COARSE_LOCATION) wird ausschließlich angefordert, um genaue Gebetszeiten für Ihre Koordinaten zu berechnen, die Qibla-Richtung zu ermitteln und nahegelegene Moscheen anzuzeigen. Die Standortverarbeitung erfolgt lokal oder über sichere Cloud-Funktionen und wird niemals auf Tracking-Servern gespeichert oder mit Ihrer Identität verknüpft.",
                li_data_2: "<strong>Zakat-Rechner Eingaben:</strong> Alle Zahlen, Vermögenswerte, Gold-/Silbergewichte und Notizen, die in den Zakat-Rechner eingegeben werden, werden lokal auf Ihrem Gerät gespeichert. Wir sammeln, übertragen oder überwachen Ihre finanziellen Eingaben nicht.",
                li_data_3: "<strong>Moschee-Vorschläge:</strong> Wenn Sie die Funktion \"Moschee vorschlagen\" nutzen, werden die von Ihnen übermittelten Informationen (Moscheename und Standortkoordinaten) sicher über Firebase Cloud Functions übertragen, ausschließlich um die Moschee zu überprüfen und zur öffentlichen Datenbank hinzuzufügen. Mit Ihrer Einreichung ist kein persönliches Profil, keine Geräte-ID und kein Benutzerkonto verknüpft.",
                li_data_4: "<strong>Ibadah & Quran Tracker Logs:</strong> Ihre täglichen Gebetsaufzeichnungen, der Lesefortschritt des Korans, benutzerdefinierte Agenden und Adhkar-Favoriten werden streng in der lokalen SQLite-Datenbank Ihres Telefons (AppDatabase) gespeichert.",
                li_data_5: "<strong>Zugriff auf lokales Netzwerk:</strong> Wir verwenden Berechtigungen für das lokale Netzwerk (ACCESS_LOCAL_NETWORK, CHANGE_WIFI_MULTICAST_STATE) ausschließlich, um Smart-TVs/Lautsprecher für das lokale Adhan-Casting innerhalb Ihres Heimnetzwerks zu erkennen.",
                li_data_6: "<strong>Wear OS-Synchronisierung:</strong> Die zwischen Ihrem Smartphone und Ihrer Uhr synchronisierten Daten (Gebetszeiten, Einstellungen, Tracker-Protokolle) verwenden die Wearable Data Layer API von Google, die verschlüsselt ist und direkt zwischen Ihren gekoppelten Geräten übertragen wird.",
                
                h_permissions: "2. Sensible Berechtigungen & wie sie verwendet werden", p_permissions_1: "Um die Kernfunktionen bereitzustellen, fordert Wasl die folgenden Berechtigungen ausschließlich für den angegebenen Zweck an:",
                li_permissions_1: "<strong>Standort:</strong> Zur Berechnung lokaler Gebetszeiten, des Qibla-Kurses und zur Abfrage nahegelegener Moscheen.",
                li_permissions_2: "<strong>Exakte Alarme & Benachrichtigungen (SCHEDULE_EXACT_ALARM, POST_NOTIFICATIONS):</strong> Unerlässlich, um präzise Adhan-Audio-Alarme und Gebetserinnerungen pünktlich zu liefern.",
                li_permissions_3: "<strong>Nutzungszugriff & System-Overlay (PACKAGE_USAGE_STATS, SYSTEM_ALERT_WINDOW):</strong> Wird exklusiv für die optionale Fokusmodus-/App-Blocker-Funktion verwendet, um ablenkende Anwendungen während der Gebetszeiten zu blockieren.",
                li_permissions_4: "<strong>Uneingeschränkte Batterie (REQUEST_IGNORE_BATTERY_OPTIMIZATIONS):</strong> Verhindert, dass das Android-Betriebssystem Hintergrunddienste für Gebetsalarme beendet.",
                li_permissions_5: "<strong>Lokales Netzwerk / Geräte in der Nähe:</strong> Wird ausschließlich verwendet, um lokale Smart-Lautsprecher/TVs für die Adhan-Casting-Funktion zu erkennen.",
                
                h_noads: "3. Absolute No-Ads- & No-Tracking-Richtlinie", p_noads_1: "Wasl enthält keinerlei Werbung und sammelt keine Marketing- oder Verhaltensanalysen. Wir entfernen die Google-Werbe-ID (com.google.android.gms.permission.AD_ID) ausdrücklich aus unserem App-Manifest, um zu garantieren, dass Ihr Gerät nicht zu Werbezwecken verfolgt werden kann.",
                
                h_links: "4. Externe Videolinks und Medieninhalte", p_links_1: "Wasl bietet direkte externe Links zu Videoquellen-Referenzen, Inhaltskanälen und Bildungsmedien:",
                li_links_1: "Durch Tippen auf einen externen Link wird eine Anwendung eines Drittanbieters oder ein Browser (z. B. YouTube oder Web-Hosts) geöffnet.",
                li_links_2: "Externe Websites und Plattformen arbeiten unter ihren eigenen, unabhängigen Datenschutzrichtlinien und Nutzungsbedingungen. Wasl überwacht Ihre externe Sehaktivität nicht und gibt keine persönlichen Benutzerdaten an diese Dienste weiter.",
                
                h_payments: "5. Finanzielle Privatsphäre & Freiwillige Unterstützung", p_payments_1: "Wenn Sie das Projekt durch freiwillige In-App-Käufe unterstützen:",
                li_payments_1: "Die Transaktionen werden vollständig über die Google Play Billing API abgewickelt.",
                li_payments_2: "Wir haben keinen Zugriff auf Ihre Kreditkarten- oder Finanzzahlungsdaten und wir sammeln oder speichern diese auch nicht.",
                
                h_storage: "6. Speicherung, Backup und Datenkontrolle", p_storage_1: "Alle App-Einstellungen, Agenden und Tracking-Aufzeichnungen werden lokal im privaten Anwendungsspeicher gespeichert. Wasl bietet manuelle Tools für den Export/Import von Backups, mit denen Sie Ihre Daten in eine lokale Datei exportieren und jederzeit wiederherstellen können.",
                
                h_thirdparty: "7. Infrastrukturdienste von Drittanbietern", p_thirdparty_1: "Um wesentliche App-Dienste auszuführen, verwendet Wasl minimale, sichere Infrastrukturdienste:",
                li_thirdparty_1: "<strong>Firebase Cloud Functions & Firestore:</strong> Um nahegelegene Moscheen abzurufen und Moscheevorschläge von Benutzern sicher zu verarbeiten.",
                li_thirdparty_2: "<strong>Firebase Cloud Messaging (FCM):</strong> Um gelegentlich wichtige App-Update-Ankündigungen bereitzustellen (optional).",
                li_thirdparty_3: "<strong>Google Play Services:</strong> Für Standortdienstprogramme, Wear OS-Synchronisierung und Abrechnung.",
                
                h_changes: "8. Änderungen der Datenschutzerklärung", p_changes_1: "Wir können diese Datenschutzerklärung regelmäßig aktualisieren. Die fortgesetzte Nutzung der Anwendung stellt die Annahme aller aktualisierten Richtlinienbedingungen dar.",
                
                h_contact: "9. Kontakt", p_contact_1: "Wenn Sie Fragen zu unserer Datenschutzerklärung oder unseren Datenpraktiken haben, kontaktieren Sie uns bitte per E-Mail:"
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', lang);
            document.getElementById('current-lang-text').textContent = lang.toUpperCase();
            
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) { element.innerHTML = translations[lang][key]; }
            });
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
            localStorage.setItem('preferredTheme', newTheme);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('preferredTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';

            const savedLang = localStorage.getItem('preferredLang') || 'en';
            setLanguage(savedLang);
        };
    </script>
